name: Excel 7 firm z pi

on:
  workflow_dispatch:
    inputs:
      pi_run_id:
        description: "Run ID artefaktu de-gu-wyniki-pi (domyslnie piatek 12.06)"
        required: false
        default: "27439840768"

permissions:
  actions: read
  contents: read

env:
  GDRIVE_FOLDER_ID: "1tP8oUi72t4EHDbE9GnHFdvfNtNsJe4xf"
  GDRIVE_VERSION_XLSX: "1"
  SCRAPER_TIMEZONE: Europe/Warsaw
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt -r requirements-drive.txt

      - name: Download artefakt piatek (de-gu-wyniki-pi)
        uses: actions/download-artifact@v4
        with:
          name: de-gu-wyniki-pi
          github-token: ${{ github.token }}
          run-id: ${{ github.event.inputs.pi_run_id }}
          path: .

      - name: Zapisz 7 firm do Excel
        run: python scripts/save_excel_seven_from_pi.py

      - name: Upload Wyniki artifact (thu)
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-thu
          path: |
            Wyniki/
            wyslane/

      - name: Upload Wyniki to Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_IMPERSONATE_EMAIL: ${{ secrets.GDRIVE_IMPERSONATE_EMAIL }}
          GDRIVE_SHARED_DRIVE_ID: ${{ secrets.GDRIVE_SHARED_DRIVE_ID }}
        run: python scripts/gdrive_upload_wyniki.py --campaign-dir .
