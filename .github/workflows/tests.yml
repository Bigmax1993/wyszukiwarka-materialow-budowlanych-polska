name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    runs-on: windows-latest
    env:
      KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
      USE_GEMINI_REPLY_INTELLIGENCE: "0"
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile core modules
        run: |
          python -m py_compile kanbud_bootstrap.py
          python -m py_compile campaign_data_paths.py
          python -m py_compile email_targeting.py
          python -m py_compile "de_gu_bauunternehmen_scraper.py"
          python -m py_compile "Niemcy wschodnie sklepy/de_ost_einzelhandel_scraper.py"

      - name: Scraper smoke tests
        run: |
          cd "Gu Baunterhnehmen"
          python de_gu_bauunternehmen_scraper.py --test
          cd "..\Niemcy wschodnie sklepy"
          python de_ost_einzelhandel_scraper.py --test

      - name: Unit tests (subset)
        run: python tests/run_all.py --categories unit
        continue-on-error: true
