name: GU czwartek backfill

on:
  schedule:
    - cron: "30 3 * * 4"
  workflow_dispatch:

env:
  SCRAPER_TIMEZONE: Europe/Warsaw

jobs:
  backfill:
    runs-on: ubuntu-latest

    env:
      KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Backfill and rebuild
        
        env:
                  run: |
          python de_gu_bauunternehmen_scraper.py --backfill-emails-from-cache
          python de_gu_bauunternehmen_scraper.py --rebuild-from-cache
