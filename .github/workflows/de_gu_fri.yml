name: GU piatek send

on:
  schedule:
    - cron: "0 7 * * 5"
  workflow_dispatch:

env:
  SCRAPER_TIMEZONE: Europe/Berlin

jobs:
  send:
    runs-on: ubuntu-latest

    env:
      KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Send emails only
        
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
                  run: python de_gu_bauunternehmen_scraper.py --send-emails-only
