name: GU czwartek backfill

on:
  schedule:
    - cron: "30 3 * * 4"
  workflow_dispatch:

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Download cache from sroda
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: de-gu-wyniki-wed
          path: .

      - name: Backfill and rebuild Excel
        run: |
          python de_gu_bauunternehmen_scraper.py --backfill-emails-from-cache
          python de_gu_bauunternehmen_scraper.py --rebuild-from-cache

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-thu
          path: |
            Wyniki/
            wyslane/
