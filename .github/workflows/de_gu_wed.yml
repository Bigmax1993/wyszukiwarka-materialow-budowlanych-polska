name: GU sroda discovery

on:
  schedule:
    - cron: "0 16 * * 3"
  workflow_dispatch:

env:
  SCRAPER_TIMEZONE: Europe/Warsaw
  DISABLE_SEND_WINDOW: "1"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Discovery (fala NRW+BY+BW)
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python de_gu_bauunternehmen_scraper.py --run-config run_config/welle_nrw_by_bw.json

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-wed
          path: |
            Wyniki/
            wyslane/
