name: Copy API secrets to PL

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror API and mail secrets to PL repo
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          PL_REPO: Bigmax1993/wyszukiwarka-materialow-budowlanych-polska
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          set -euo pipefail
          for name in SERPER_API_KEY ANTHROPIC_API_KEY MAIL_USER MAIL_PASSWORD; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "Brak wartosci dla $name w repo zrodlowym"
              exit 1
            fi
            printf '%s' "$val" | gh secret set "$name" -R "$PL_REPO"
            echo "OK: $name -> $PL_REPO"
          done
